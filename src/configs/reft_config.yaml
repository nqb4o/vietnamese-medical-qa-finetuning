model:
  new_adapter_name: "phogpt-4b-reft-dpo-adapter"
  final_model_name: "phogpt-4b-medical-chatbot-reft"

training:
  beta: 0.1

  output_dir: "./results/reft_dpo_training"
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6
  optim: "paged_adamw_32bit"

  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true

  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1

  report_to: "tensorboard"