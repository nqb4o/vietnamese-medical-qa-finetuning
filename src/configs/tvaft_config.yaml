model:
  base_model_name: "vinai/PhoGPT-4B-Chat"
  torch_dtype: "bfloat16"
  new_model_name: "phogpt-4b-medical-chatbot-tvaft"

data:
  dataset_name: "hungnm/vietnamese-medical-qa"
  prompt_template: "### Câu hỏi: {instruction}\n### Trả lời:"
  test_size: 0.1
  seed: 42
  max_samples: 4167
  max_seq_length: 1024
  epsilon: 1.0e-9
  paths:
    raw_data: "data/raw/hungnm_vietnamese-medical-qa.json"
    tvaft_intermediate_dir: "data/processed/tvaft_intermediate"
    tvaft_01_model_responses: "data/processed/tvaft_intermediate/01_model_responses.csv"
    tvaft_02_judgements: "data/processed/tvaft_intermediate/02_judgements.csv"
    tvaft_03_bert_labels: "data/processed/tvaft_intermediate/03_bert_labels.csv"
    tvaft_final_dataset: "data/processed/tvaft_intermediate/tvaft_finetune_dataset.json"

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: false

peft:
  r: 16
  lora_alpha: 32
  target_modules:
    - "Wqkv"
    - "out_proj"
    - "up_proj"
    - "down_proj"
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./results/tvaft_training"
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  optim: "paged_adamw_32bit"

  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true

  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 0.3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"

  report_to: "tensorboard"
  remove_unused_columns: false

tvaft_params:
  p_correct_threshold: 0.95
  p_incorrect_threshold: 0.01
  r_saliency_threshold: 1.2
  bonus_multiplier: 1.5
  bonus_steepness: 5.0

  penalty_default: 0.5

  scaling:
    min_val: 0.2
    max_val: 2.5
    scale_factor: 1.0

  probe_context_separator: "\\n<SEP>\\n"
  max_new_tokens_for_ymodel: 512  #  not used