model:
  new_model_name: "phogpt-4b-medical-chatbot-tvaft"

training:
  output_dir: "./results/tvaft_training"
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  optim: "paged_adamw_32bit"

  evaluation_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 2
  load_best_model_at_end: true

  learning_rate: 5.0e-5
  weight_decay: 0.01
  max_grad_norm: 0.3
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"

  report_to: "tensorboard"
  remove_unused_columns: false

tvaft_params:
  p_correct_threshold: 0.95
  p_incorrect_threshold: 0.01
  r_saliency_threshold: 1.2

  bonus_multiplier: 1.5
  bonus_steepness: 5.0

  penalty_default: 0.5

  scaling:
    min_val: 0.2
    max_val: 2.5
    scale_factor: 1.0

  probe_context_separator: "\\n<SEP>\\n"
  max_new_tokens_for_ymodel: 512